<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // This grabs the current path and redirects the standalone PWA to your homepage
      const segment = window.location.pathname.split('/')[1];
      if (segment && !window.location.pathname.endsWith('index.html')) {
        window.location.replace('/' + segment + '/index.html');
      } else {
        window.location.replace('./index.html');
      }
    </script>
  </head>
  <body>
  </body>
</html>
